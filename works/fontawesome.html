    <title>Font Awesome 4.7 图标大全</title>

    <meta name="category" content="图标资源" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #252540;
            --border: #2a2a45;
            --text: #e8e8f0;
            --text-muted: #8888aa;
            --accent: #4a9eff;
            --accent-hover: #6ab0ff;
            --accent-dim: rgba(74,158,255,0.12);
            --green: #4ade80;
            --radius: 12px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 0;
        }
        .app { max-width: 1400px; margin: 0 auto; padding: 24px 20px 60px; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header h1 small {
            font-size: 0.9rem;
            -webkit-text-fill-color: var(--text-muted);
            color: var(--text-muted);
            font-weight: 400;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Search */
        .search-wrap {
            position: relative;
            width: 260px;
        }
        .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-wrap input:focus { border-color: var(--accent); }
        .search-wrap input::placeholder { color: var(--text-muted); }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
        }
        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
            padding: 4px 6px;
            border-radius: 50%;
        }
        .search-clear:hover { color: var(--text); }
        .search-clear.show { display: block; }

        /* Download Btn */
        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74,158,255,0.3);
        }
        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-download .fa { font-size: 1.1rem; }

        /* Stats bar */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .stats-bar .count b { color: var(--text); }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        .category-tab {
            padding: 7px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .category-tab:hover { border-color: var(--accent); color: var(--text); }
        .category-tab.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }
        .category-tab .badge {
            display: inline-block;
            margin-left: 6px;
            padding: 1px 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            font-size: 0.75rem;
        }
        .category-tab.active .badge { background: rgba(74,158,255,0.2); }

        /* Icon Grid */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
        }
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 18px 8px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            user-select: none;
        }
        .icon-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .icon-item .fa {
            font-size: 1.8rem;
            color: var(--accent);
            transition: transform 0.2s;
        }
        .icon-item:hover .fa { transform: scale(1.25); }
        .icon-item .label {
            font-size: 0.72rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            text-align: center;
            transition: color 0.2s;
        }
        .icon-item:hover .label { color: var(--text); }
        .icon-item .copy-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 6px;
            background: var(--green);
            color: #000;
            font-weight: 600;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s;
        }
        .icon-item .copy-badge.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Empty */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .fa { font-size: 3rem; margin-bottom: 16px; color: var(--border); }
        .empty-state p { font-size: 1rem; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
            z-index: 9999;
            pointer-events: none;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.06);
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Progress overlay for download */
        .progress-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .progress-overlay.show { display: flex; }
        .progress-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 44px;
            text-align: center;
            max-width: 380px;
        }
        .progress-card .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-card p { font-size: 0.95rem; color: var(--text-muted); }
        .progress-card p b { color: var(--text); }

        /* Responsive */
        @media (max-width: 768px) {
            .app { padding: 16px 12px 40px; }
            .header h1 { font-size: 1.3rem; }
            .search-wrap { width: 100%; }
            .header-actions { width: 100%; }
            .btn-download { flex: 1; justify-content: center; }
            .icon-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; }
            .icon-item { padding: 14px 6px 10px; }
            .icon-item .fa { font-size: 1.4rem; }
            .icon-item .label { font-size: 0.65rem; }
        }
        @media (max-width: 480px) {
            .icon-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <h1>Font Awesome 4.7 <small>图标大全</small></h1>
        <div class="header-actions">
            <div class="search-wrap">

    <div class="category-tabs" id="categoryTabs"></div>
    <div class="icon-grid" id="iconGrid"></div>
</div>

<div id="toast"></div>

<div class="progress-overlay" id="progressOverlay">

</div>

function getCategory(iconName) {
    var name = iconName.replace('fa-', '');
    for (var i = 0; i < CATEGORY_RULES.length; i++) {
        if (CATEGORY_RULES[i].test(name)) return CATEGORY_RULES[i].name;
    }
    return 'Web 应用图标';
}

var grid = document.getElementById('iconGrid');
var tabs = document.getElementById('categoryTabs');
var searchInput = document.getElementById('searchInput');
var searchClear = document.getElementById('searchClear');
var totalCount = document.getElementById('totalCount');
var matchCount = document.getElementById('matchCount');
var resultCount = document.getElementById('resultCount');
var toast = document.getElementById('toast');

// 构建分类数据
var categorized = {};
ICONS.forEach(function(name) {
    var cat = getCategory(name);
    if (!categorized[cat]) categorized[cat] = [];
    categorized[cat].push(name);
});
var CAT_ORDER = ['Web 应用图标', '方向 & 箭头', '手势图标', '文件图标', '文本编辑', '媒体控制', '用户 & 头像', '表单 & 切换', '品牌图标'];
totalCount.textContent = ICONS.length;

// 渲染分类标签
function renderTabs(activeCat, filter) {
    tabs.innerHTML = '';
    // "全部" 标签
    var allBtn = document.createElement('button');
    allBtn.className = 'category-tab' + (activeCat === '__all__' ? ' active' : '');
    allBtn.textContent = '全部';
    var badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = filter ? countFiltered(filter) : ICONS.length;
    allBtn.appendChild(badge);
    allBtn.addEventListener('click', function() { renderTabs('__all__', searchInput.value.trim()); renderGrid('__all__', searchInput.value.trim()); });
    tabs.appendChild(allBtn);

    CAT_ORDER.forEach(function(cat) {
        if (!categorized[cat] || categorized[cat].length === 0) return;
        var count = filter ? categorized[cat].filter(function(n) { return n.indexOf('fa-' + filter) !== -1; }).length : categorized[cat].length;
        if (count === 0) return;
        var btn = document.createElement('button');
        btn.className = 'category-tab' + (activeCat === cat ? ' active' : '');
        btn.textContent = cat;
        var badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = count;
        btn.appendChild(badge);
        btn.addEventListener('click', function() { renderTabs(cat, searchInput.value.trim()); renderGrid(cat, searchInput.value.trim()); });
        tabs.appendChild(btn);
    });
}

function countFiltered(filter) {
    var f = filter.toLowerCase().replace('fa-', '');
    var cnt = 0;
    for (var i = 0; i < ICONS.length; i++) {
        if (ICONS[i].indexOf('fa-' + f) !== -1) cnt++;
    }
    return cnt;
}

// 渲染图标网格
function renderGrid(category, filter) {
    var f = filter ? filter.toLowerCase().replace('fa-', '') : '';
    var items = [];
    CAT_ORDER.forEach(function(cat) {
        if (category !== '__all__' && cat !== category) return;
        if (!categorized[cat]) return;
        categorized[cat].forEach(function(name) {
            if (f && name.indexOf('fa-' + f) === -1) return;
            items.push(name);
        });
    });

    grid.innerHTML = '';
    if (items.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="fa fa-search"></div><p>未找到匹配的图标</p></div>';
        resultCount.style.display = 'none';
        return;
    }

    resultCount.style.display = filter ? 'block' : 'none';
    matchCount.textContent = items.length;

    items.forEach(function(name) {
        var el = document.createElement('div');
        el.className = 'icon-item';
        el.innerHTML = '<i class="fa ' + name + '" aria-hidden="true"></i><span class="label">' + name.replace('fa-', '') + '</span><span class="copy-badge">已复制</span>';

        var badge = el.querySelector('.copy-badge');
        el.addEventListener('click', function() {
            var cls = name;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(cls).catch(function() { fallbackCopy(cls); });
            } else {
                fallbackCopy(cls);
            }
            badge.classList.add('show');
            showToast('已复制: ' + cls);
            setTimeout(function() { badge.classList.remove('show'); }, 1200);
        });

        grid.appendChild(el);
    });
}

function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
}

function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._hide);
    toast._hide = setTimeout(function() { toast.classList.remove('show'); }, 1800);
}

// 搜索
searchInput.addEventListener('input', function() {
    var val = this.value.trim();
    searchClear.classList.toggle('show', val.length > 0);
    var active = document.querySelector('.category-tab.active');
    var cat = active ? active.textContent.trim() : '__all__';
    // Don't match badge numbers
    var catName = cat.replace(/\d+/g, '').trim() || '__all__';
    // Check if the category exists
    var isAll = catName === '__all__' || !CAT_ORDER.some(function(c) { return catName.indexOf(c) !== -1; }) && catName !== '全部';
    if (!isAll) {
        var matchedCat = CAT_ORDER.filter(function(c) { return catName.indexOf(c) !== -1; })[0];
        isAll = !matchedCat;
        catName = matchedCat || '__all__';
    } else {
        catName = '__all__';
    }

    renderTabs(catName, val);
    renderGrid(catName, val);
});

searchClear.addEventListener('click', function() {
    searchInput.value = '';
    searchClear.classList.remove('show');
    renderTabs('__all__', '');
    renderGrid('__all__', '');
    searchInput.focus();
});

// 初始渲染
renderTabs('__all__', '');
renderGrid('__all__', '');

// 4. 下载 ZIP — 含 CSS、字体文件、AI 使用指南 MD
// ============================================================
var FA_CDN_BASE = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0';
document.getElementById('downloadBtn').addEventListener('click', handleDownload);

async function handleDownload() {
    var overlay = document.getElementById('progressOverlay');
    var progressText = document.getElementById('progressText');
    var btn = document.getElementById('downloadBtn');
    btn.disabled = true;
    overlay.classList.add('show');

    try {
        var zip = new JSZip();

        // 4a. 获取 CSS
        progressText.textContent = '获取 font-awesome.css ...';
        var cssResp = await fetch(FA_CDN_BASE + '/css/font-awesome.min.css');
        var cssText = await cssResp.text();
        zip.file('font-awesome/css/font-awesome.min.css', cssText);

        // 4b. 获取 woff2 字体文件 (最小)
        progressText.textContent = '获取字体文件 ...';
        var fontResp = await fetch(FA_CDN_BASE + '/fonts/fontawesome-webfont.woff2');
        var fontBlob = await fontResp.blob();
        zip.file('font-awesome/fonts/fontawesome-webfont.woff2', fontBlob);

        // 4c. 生成 AI 使用指南 MD
        progressText.textContent = '生成 AI 指南文档 ...';
        var md = generateAIGuide();
        zip.file('font-awesome/ai-guide.md', md);

        // 4d. 生成完整图标列表 MD 参考
        var iconListMd = generateIconList();
        zip.file('font-awesome/icon-list.md', iconListMd);

        // 4e. 打包下载
        progressText.textContent = '打包 ZIP ...';
        var zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });

        var url = URL.createObjectURL(zipBlob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'fontawesome-4.7.zip';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(url); }, 10000);

        showToast('下载完成！ZIP 包含 CSS、字体文件及 AI 使用指南');
    } catch (err) {
        console.error('下载失败:', err);
        showToast('下载失败: ' + err.message);
    } finally {
        overlay.classList.remove('show');
        btn.disabled = false;
    }
}

function generateIconList() {
    var md = '# Font Awesome 4.7 完整图标列表\n\n';
    md += '## 总览\n\n共 **' + ICONS.length + '** 个图标，按分类排列：\n\n';

    CAT_ORDER.forEach(function(cat) {
        if (!categorized[cat] || categorized[cat].length === 0) return;
        md += '## ' + cat + '（' + categorized[cat].length + ' 个）\n\n';
        md += '| 类名 | 说明 |\n|------|------|\n';
        categorized[cat].forEach(function(name) {
            var shortName = name.replace('fa-', '');
            var desc = getIconHint(shortName);
            md += '| `' + name + '` | ' + desc + ' |\n';
        });
        md += '\n';
    });

    md += '---\n> 由 [Blupure 会客厅](https://blupureqingan.github.io/Blupure_html) 自动生成\n';
    return md;
}
