// 去重
var uniqueIcons = [];
var seen = {};
for (var i = 0; i < icons.length; i++) {
    if (!seen[icons[i]]) {
        uniqueIcons.push(icons[i]);
        seen[icons[i]] = true;
    }
}

var listEl = document.getElementById('iconList');

function renderIcons(filter) {
    listEl.innerHTML = '';
    var count = 0;
    for (var i = 0; i < uniqueIcons.length; i++) {
        var name = uniqueIcons[i];
        if (filter && name.indexOf(filter) === -1) continue;
        var div = document.createElement('div');
        div.className = 'fa-hover col-md-3 col-sm-4';
        div.innerHTML = '<i class="fa ' + name + '" aria-hidden="true"></i> ' + name.replace('fa-', '');
        div.onclick = (function(n) {
            return function() {
                var input = document.createElement('input');
                input.value = n;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                var toast = document.getElementById('toast');
                toast.textContent = '已复制: ' + n;
                toast.style.opacity = '1';
                setTimeout(function() { toast.style.opacity = '0'; }, 1500);
            };
        })(name);
        listEl.appendChild(div);
        count++;
    }
    if (count === 0) {
        listEl.innerHTML = '<div class="col-xs-12" style="text-align:center;padding:40px;color:#999;font-size:18px">未找到匹配的图标</div>';
    }
}

function filterIcons(val) {
    renderIcons(val.trim().toLowerCase().replace('fa-', ''));
}

renderIcons('');
