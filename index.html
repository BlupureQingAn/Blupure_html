    <style>
        :root {
            --font-1: "Noto Serif SC", "Roboto Flex", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", serif; /* 全局衬线体 */
            --pure-blue: #002FA7; /* 蓝色纯度核心色 */
            --pure-blue-hover: #001F70;
            --pure-blue-light: #E6EDFF;
            --pure-blue-alpha: rgba(0, 47, 167, 0.08);
            --text-dark: #111111;
            --text-soft: #555555;
            --card-bg: #ffffff;
            --section-bg-alt: #fafafb;
            --shadow-card: rgba(0, 47, 167, 0.08);
            --shadow-card-hover: rgba(0, 47, 167, 0.2);
            --text-gradient-end: #444444;
        }

        /* 深色主题（JS 控制，无条件跟随用户选择） */
        html.dark-mode {
            --pure-blue: #4D7CFF;
            --pure-blue-hover: #6B8FFF;
            --pure-blue-light: #0D1B3E;
            --pure-blue-alpha: rgba(77, 124, 255, 0.15);
            --text-dark: #E8E8E8;
            --text-soft: #AAAAAA;
            --card-bg: #1A1B2E;
            --section-bg-alt: #12131E;
            --shadow-card: rgba(0, 0, 0, 0.3);
            --shadow-card-hover: rgba(0, 0, 0, 0.4);
            --text-gradient-end: #BBBBBB;
        }

        /* 基础元素重写 */
        ::selection {
            background-color: var(--pure-blue);
            color: #ffffff;
        }
        ::-moz-selection {
            background-color: var(--pure-blue);
            color: #ffffff;
        }

        a, a:hover, a:focus {
            color: var(--pure-blue);
        }

        /* 头部与导航栏微调 */
        .s-header {
            border-bottom: 1px solid rgba(0, 47, 167, 0.06);
        }
        .header-brand__text {
            color: var(--pure-blue) !important;
            font-weight: 700;
            letter-spacing: 0.05em;
            font-family: var(--font-1);
            text-transform: none;
        }
        .header-nav__links li.current a {
            color: var(--pure-blue) !important;
        }
        .header-nav__links li.current a::after {
            background-color: var(--pure-blue) !important;
        }
        .header-nav__links a:hover {
            color: var(--pure-blue) !important;
        }

        /* 欢迎区大字体及排版优化 */
        .s-intro {
    min-height: 80vh;
    display: flex;
    align-items: center;
    background: radial-gradient(circle at 50% 50%, var(--pure-blue-alpha) 0%, rgba(0, 119, 255, 0.04) 35%, transparent 60%);
    margin-top: 2px;   /* 向下微调，对齐顶栏横线 */
    position: relative;
    z-index: 1;
}
        .intro-content__overline {
            color: var(--pure-blue) !important;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
/* 1. 浮动与流光动画定义（保持不变） */
@keyframes floatAnimation {
    0% {
        transform: translateY(0px) rotate(0deg);
    }
    50% {
        transform: translateY(-15px) rotate(0.5deg);
    }
    100% {
        transform: translateY(0px) rotate(0deg);
    }
}

@keyframes streamGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 逐字掉落动画（从屏幕上方丝滑落下） */
@keyframes charFall {
    0%   { opacity: 0; transform: translateY(-150vh); }
    100% { opacity: 1; transform: translateY(0); }
}

/* 逐字浮动动画 */
@keyframes charFloat {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}

/* 晕影淡入（等掉落动画全部结束后出现） */
@keyframes shadowFadeIn {
    to { opacity: 1; }
}

/* 2. 标题整体容器样式（负责全局字体、字号和浮动动画） */
.intro-title-styled {
    font-size: clamp(4.5rem, 8.5vw, 9.5rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-top: 1.5rem;
    margin-bottom: 2.5rem;

    display: block;
    width: 100%;
    visibility: hidden;
}

/* 3. 中文部分（欢迎来到 & 会客厅）独立样式 */
.title-text, .title-text-alt {
    font-size: clamp(1.6rem, 2.8vw, 3.6rem);
    background: linear-gradient(135deg, var(--text-dark) 30%, var(--text-gradient-end) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--text-dark); /* 降级备用色 */
    display: block;
    margin: 0;
    padding: 0;
    letter-spacing: 0.08em;
}
.title-text {
    margin-bottom: 0;
}
.title-text-alt {
    margin-top: -0.5rem;
}

/* 4. 专属品牌词（Blupure）流光发光样式 */
.title-brand {
    font-family: "Mea Culpa", "Inter", "Helvetica Neue", Arial, sans-serif;
    font-size: clamp(10rem, 22vw, 28rem);
    font-weight: 900;
    font-style: normal;
    letter-spacing: -0.01em;
    display: flex;
    justify-content: center;
    margin: -12rem 0 0 0;
    padding: 0 0.6em;
    white-space: nowrap;
    line-height: 1.1;
}
.char {
    display: inline-block;
    position: relative;
    animation: charFall 0.8s cubic-bezier(0.15, 0.85, 0.35, 1) both;
    animation-delay: calc(var(--i) * 0.08s + 0.5s);
}
/* 只有 Blupure 字母保留浮动动画 */
.title-brand .char {
    animation:
        charFall 0.8s cubic-bezier(0.15, 0.85, 0.35, 1) both,
        charFloat 3s ease-in-out infinite;
    animation-delay:
        calc(var(--i) * 0.08s + 0.5s),
        calc(var(--i) * 0.08s + 1.3s);
}

/* Blupure 逐字晕影：每个字母掉落完毕后淡入跟随 */
.title-brand .char::after {
    content: attr(data-char);
    position: absolute;
    top: 0.06em;
    left: 0;
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    color: rgba(0, 47, 167, 0.15);
    filter: blur(4px);
    z-index: -1;
    pointer-events: none;
    opacity: 0;
    animation: shadowFadeIn 0.3s ease-out calc(var(--i) * 0.08s + 0.9s) forwards;
}

.char__inner {
    display: inline-block;
}

/* 中文文字的浮动 + 文字颜色 */
.title-text .char__inner,
.title-text-alt .char__inner {
    background: linear-gradient(135deg, var(--text-dark) 30%, var(--text-gradient-end) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    color: var(--text-dark);
}

/* Blupure 字母间距 */
.title-brand .char {
    margin: 0 0.08em;
    padding: 0;
}
.title-brand .char:last-child {
    margin-right: 0;
}

/* Blupure 逐字 HSL 深→浅 + 克莱因蓝光晕 */
.title-brand .char__inner {
    color: hsl(220, 100%, calc(20% + var(--i) * 4.5%));
    text-shadow: 0 0 12px rgba(0, 47, 167, 0.4);
}

/* 调整介绍段落的字体大小、颜色与间距 */
.intro-content .intro-content__desc.lead {
    color: var(--text-soft) !important;       /* 改为灰色 */
    font-size: 1.45rem !important;    /* 缩小字体 (原模板通常为 1.8rem 或更大) */
    margin-top: 12rem !important;    /* 增大上边距，与标题拉开距离 */
    line-height: 1.8;                 /* 稍微拉开行高，提升精致感 */
    letter-spacing: 0.05em;           /* 轻微增加字间距 */
}

        .intro-scroll__line {
            background-color: var(--pure-blue) !important;
        }

        /* 动态作品展示区布局 */
        .s-works {
            padding-top: 12rem;
            padding-bottom: 12rem;
            background-color: var(--section-bg-alt);
            border-top: 1px solid rgba(0, 47, 167, 0.05);
        }
        .s-works .section-title {
            font-family: var(--font-1);
            font-size: var(--type-size-lead);
        }
        .works-subtitle {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0.8rem;
        }
        .works-subtitle .ws-action {
            color: var(--pure-blue);
            font-weight: 600;
        }
        .works-subtitle .ws-hint {
            color: var(--text-soft);
        }
        .s-works .lead {
            font-size: var(--text-lg);
        }
        .section-title {
            color: var(--text-dark);
        }
        .section-title::before {
            color: var(--pure-blue) !important;
        }

        /* 卡片入场动画：从下方升起并淡入 */
        @keyframes cardEnter {
            0%   { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .portfolio-card {
            animation: cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: calc(var(--card-i) * 0.08s);
        }

        /* 作品网格基础设计（保持 PC 端多列排版） */
        .portfolio-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 40px;
            width: 100%;
            margin-top: 4rem;
        }

        /* 分类标题 */
        .category-header {
            grid-column: 1 / -1;
            margin: 3rem 0 0.5rem 0;
            padding-bottom: 0.6rem;
            border-bottom: 2px solid var(--pure-blue-alpha);
        }
        .category-header:first-of-type { margin-top: 0; }
        .category-title {
            font-family: var(--font-1);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--pure-blue);
            margin: 0;
        }

        /* ===== 移动端适配（屏幕宽度 < 768px） ===== */
        @media screen and (max-width: 768px) {
            .portfolio-group {
                /* 手机端强制单列铺满，不受 340px 限制 */
                grid-template-columns: 1fr;
                /* 缩小卡片之间的垂直间距，更符合手机端精致排版 */
                gap: 24px;
                margin-top: 4rem;
            }

            /* 标题区移动端适配：缩小字号、减少负边距，避免重叠 */
            .intro-title-styled {
                margin-top: 2rem;
                margin-bottom: 1.5rem;
            }
            .title-brand {
                font-size: clamp(5.5rem, 14vw, 10rem);
                margin-top: -1rem;
            }
            .title-text-alt {
                margin-top: 0.5rem;
            }
        }
        .portfolio-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 47, 167, 0.06);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .portfolio-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px var(--shadow-card);
            border-color: var(--shadow-card-hover, rgba(0, 47, 167, 0.2));
        }
        .portfolio-card__media {
            display: block;
            position: relative;
            aspect-ratio: 16/10;
            overflow: hidden;
            background-color: var(--pure-blue-light);
        }
        .portfolio-card__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .portfolio-card:hover .portfolio-card__img {
            transform: scale(1.04);
        }
        
        /* 遮罩悬停效果 */
        .portfolio-card__media::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 47, 167, 0.85);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
        }
        html.dark-mode .portfolio-card__media::before {
            background-color: rgba(77, 124, 255, 0.75);
        }
        .portfolio-card:hover .portfolio-card__media::before {
            opacity: 1;
        }
        
        /* 遮罩上的箭头引导 */
        .portfolio-card__action-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            opacity: 0;
            z-index: 2;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .portfolio-card:hover .portfolio-card__action-hint {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 卡片内容区域 */
        .portfolio-card__content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            border-top: 1px solid rgba(0, 47, 167, 0.03);
        }
        .portfolio-card__title {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            line-height: 1.4;
            color: var(--text-dark);
            transition: color 0.3s ease;
        }
        .portfolio-card:hover .portfolio-card__title {
            color: var(--pure-blue);
        }
        .portfolio-card__desc {
            font-size: 1.35rem;
            line-height: 1.6;
            color: var(--text-soft);
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        /* 加载状态与提示样式 */
        .loading-wrapper {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10rem 0;
            text-align: center;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0, 47, 167, 0.1);
            border-top: 3px solid var(--pure-blue);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
            margin-bottom: 2rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 1.5rem;
            color: var(--text-soft);
            letter-spacing: 0.05em;
        }

        /* 错误/空状态增强 */
        .empty-state-message, .error-state-message {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.02);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem 0.8rem;
            display: flex;
            align-items: center;
            color: var(--text-soft);
            transition: color 0.3s ease;
            margin-left: 0.5rem;
        }
        .theme-toggle:hover {
            color: var(--pure-blue);
        }
        .theme-toggle__icon {
            width: 20px;
            height: 20px;
        }
        .theme-toggle__icon--moon { display: block; }
        .theme-toggle__icon--sun { display: none; }
        html.dark-mode .theme-toggle__icon--moon { display: none; }
        html.dark-mode .theme-toggle__icon--sun { display: block; }

        /* 页脚极简化 */
        .s-footer {
            padding-top: 8rem;
            padding-bottom: 8rem;
            background-color: var(--card-bg);
            border-top: 1px solid rgba(0, 47, 167, 0.05);
        }
        .s-footer .ss-copyright,
        .s-footer .ss-back-to-top {
            font-size: 1.2rem;
        }
        .footer-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .footer-logo {
            font-weight: 700;
            color: var(--pure-blue);
            letter-spacing: 0.05em;
        }

        /* ===== 深色主题专属样式 ===== */
        html.dark-mode .title-brand .char__inner {
            color: hsl(220, 80%, calc(55% + var(--i) * 3.5%));
            text-shadow: 0 0 20px rgba(77, 124, 255, 0.6), 0 0 40px rgba(77, 124, 255, 0.3);
        }
        html.dark-mode .title-brand .char::after {
            color: rgba(77, 124, 255, 0.25);
        }
        html.dark-mode .title-text .char__inner,
        html.dark-mode .title-text-alt .char__inner {
            background: linear-gradient(135deg, var(--text-dark) 30%, var(--text-gradient-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: var(--text-dark);
        }

        /* intro 背景图深色叠加 */
        html.dark-mode .s-intro::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10, 14, 30, 0.65);
            z-index: 1;
            pointer-events: none;
        }

        /* 平滑过渡 */
        html.dark-mode,
        html.dark-mode * {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
    </style>
</head>

    <!-- 核心加载模块：重构作品抓取逻辑，修复稳定性，保留蓝色纯度格调

    <script>
        (function() {
            // 确保 DOM 加载完成再执行
            document.addEventListener('DOMContentLoaded', () => {
                
                // ----- 配置区（本地调试或自定义域名时填写自己的 GitHub 信息）-----
                const MANUAL_OWNER = "BlupureQingAn";    // GitHub 用户名
                const MANUAL_REPO  = "Blupure_html";     // 仓库名
                // -------------------------------------------------------------
                
                const container = document.getElementById('portfolio-container');
                if (!container) return;

                // 辅助函数: 生成高质优雅 SVG 占位 (Blupure风格)
                function generatePureBlueCover(titleText) {
                    const safeTitle = titleText.substring(0, 28);
                    return `data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500"><rect width="100%" height="100%" fill="%23002FA7"/><path d="M0 350 L800 280" stroke="%23FFFFFF" stroke-width="1.2" fill="none" opacity="0.15"/><circle cx="680" cy="100" r="180" fill="%23001F75" opacity="0.5"/><circle cx="120" cy="400" r="140" fill="%23001A60" opacity="0.4"/><text x="8%" y="85%" fill="%23FFFFFF" font-family="'Inter',system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" letter-spacing="0.02em" opacity="0.95">${escapeXml(safeTitle)}</text><text x="8%" y="75%" fill="%23FFFFFF" font-family="'Inter',system-ui" font-size="16" font-weight="400" opacity="0.6">Blupure · 作品集</text></svg>`;
                }

                function escapeXml(str) {
                    if(!str) return '';
                    return str.replace(/[<>&]/g, function(m) {
                        if(m === '<') return '\\u003c';
                        if(m === '>') return '\\u003e';
                        if(m === '&') return '\\u0026';
                        return m;
                    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                        return c;
                    });
                }

                // 获取正确的仓库信息（智能识别 github pages + 手动模式）
                function getRepositoryInfo() {
                    let owner = MANUAL_OWNER.trim();
                    let repo = MANUAL_REPO.trim();
                    const hostname = window.location.hostname;
                    const pathname = window.location.pathname;
                    
                    // 优先使用手动配置 (覆盖自动识别，更可靠)
                    if (owner && repo) {
                        return { owner, repo };
                    }
                    
                    // 自动识别: 适用于 *.github.io 域名
                    if (hostname.endsWith('.github.io')) {
                        owner = hostname.split('.')[0];
                        const pathParts = pathname.split('/').filter(Boolean);
                        if (pathParts.length > 0 && !pathParts[0].endsWith('.html')) {
                            repo = pathParts[0];
                        } else {
                            repo = `${owner}.github.io`;
                        }
                        return { owner, repo };
                    }
                    
                    // 未提供任何有效信息时返回 null
                    return { owner: null, repo: null };
                }

                // 针对单个作品文件，深度提取标题，描述，封面图
// 修改后的 parseWorkMetadata，支持传入同名封面
async function parseWorkMetadata(fileItem, sameNameCoverUrl = '') {
    const fileName = fileItem.name;
    const workPath = `works/${fileName}`;
    let htmlText = '';
    try {
        const resp = await fetch(fileItem.download_url);
        if (!resp.ok) throw new Error(`fetch failed ${resp.status}`);
        htmlText = await resp.text();
    } catch (err) {
        console.warn(`获取内容失败 ${fileName}:`, err);
        return {
            title: fileName.replace('.html', '').replace(/[-_]/g, ' '),
            description: '独立创作的数字化项目，点击卡片即刻探索沉浸空间。',
            coverImg: sameNameCoverUrl || generatePureBlueCover(fileName.replace('.html', '')),
            valid: true
        };
    }
    
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlText, 'text/html');
    
    // 标题：依然使用文件名（你可以保留原逻辑，这里按你的要求优先文件名）
    let rawTitle = fileName.replace(/\.html$/i, '').replace(/[-_]/g, ' ');
    
    // 描述提取（不变）
    let description = '';
    const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content');
    const ogDesc = doc.querySelector('meta[property="og:description"]')?.getAttribute('content');
    if (metaDesc && metaDesc.trim()) description = metaDesc.trim();
    else if (ogDesc && ogDesc.trim()) description = ogDesc.trim();
    else description = '该作品为Blupure对艺术的数字化转译，交互，文本，视觉相互渗透。点击进入完整体验。';
    
    // 封面图逻辑：优先使用传入的同名封面，其次 meta/og:image，最后蓝色 SVG
    let coverImg = sameNameCoverUrl;
    if (!coverImg) {
        const metaCover = doc.querySelector('meta[name="cover"]')?.getAttribute('content');
        const ogImage = doc.querySelector('meta[property="og:image"]')?.getAttribute('content');
        if (metaCover && metaCover.trim()) coverImg = metaCover.trim();
        else if (ogImage && ogImage.trim()) coverImg = ogImage.trim();
        
        if (!coverImg) {
            const firstImage = doc.querySelector('img');
            if (firstImage && firstImage.getAttribute('src')) {
                let src = firstImage.getAttribute('src');
                if (src && !src.startsWith('http') && !src.startsWith('//') && !src.startsWith('data:')) {
                    if (src.startsWith('./')) src = src.substring(2);
                    if (!src.startsWith('/') && !src.includes('://')) {
                        src = `works/${src}`;
                    }
                }
                coverImg = src;
            }
        }
    }
    
    if (!coverImg || coverImg === '') {
        coverImg = generatePureBlueCover(rawTitle);
    }

    // 分类提取
    let category = '';
    const metaCategory = doc.querySelector('meta[name="category"]')?.getAttribute('content');
    if (metaCategory && metaCategory.trim()) category = metaCategory.trim();

    return {
        title: rawTitle,
        description: description,
        coverImg: coverImg,
        category: category,
        valid: true,
        fileName: fileName,
        workUrl: workPath
    };
}
// 渲染单个卡片

}
                
                // 展示加载错误 (网络/权限/限流等)
                function showNetworkError(msg, detail = '') {
                    container.innerHTML = `
                        <div class="loading-wrapper error-state-message" style="background: var(--card-bg); border-radius: 24px;">

                            <button id="retry-works-btn" style="margin-top: 2rem; background: var(--pure-blue); border: none; color: white; padding: 0.8rem 2rem; border-radius: 40px; font-weight: 500; cursor: pointer;">重新加载</button>
                        </div>
                    `;
                    const retryBtn = document.getElementById('retry-works-btn');
                    if (retryBtn) retryBtn.addEventListener('click', () => { window.location.reload(); });
                }
                
                function showEmptyWorks() {
                    container.innerHTML = `
                        <div class="loading-wrapper empty-state-message" style="background: var(--card-bg); border-radius: 24px; border: 1px dashed var(--pure-blue-alpha);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--pure-blue)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">

                                <line x1="12" y1="18" x2="12" y2="12"></line>

                            </svg>
                            <h3 style="color: var(--text-dark); margin-top: 0;">暂无作品陈列</h3>
                            <p style="max-width: 480px; font-size: 1.4rem;">请在仓库根目录创建 <strong style="color: var(--pure-blue);">/works</strong> 文件夹，并将您的 HTML 作品文件放入其中。系统会自动扫描并生成卡片，无需额外配置。</p>
                            <p style="font-size: 1.2rem; margin-top: 1.2rem;">✨ 提示: 每个作品支持自定义标题(title)、描述(meta name="description") 和封面(meta name="cover")</p>
                        </div>
                    `;
                }
                
                // 主要入口: 调用 GitHub API 获取 works 目录内容并渲染
function renderWorks(allMetas) {
    const CATEGORY_ORDER = ['互动游戏', '实用工具', '参考文档', '图标资源'];
    const CATEGORY_LABELS = { '互动游戏': '互动游戏', '实用工具': '实用工具', '参考文档': '参考文档', '图标资源': '图标资源' };

    const groups = {};
    for (const meta of allMetas) {
        const cat = meta.category || '其他';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(meta);
    }

    container.innerHTML = '';
    var cardIdx = 0;
    for (const cat of CATEGORY_ORDER) {
        const items = groups[cat];
        if (!items || items.length === 0) continue;
        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = '<h3 class="category-title">' + (CATEGORY_LABELS[cat] || cat) + '</h3>';
        container.appendChild(header);
        items.forEach(function(meta) {
            var card = renderCard(meta);
            card.style.setProperty('--card-i', cardIdx);
            cardIdx++;
            container.appendChild(card);
        });
    }

    // 图片加载错误后备
    container.querySelectorAll('.portfolio-card__img').forEach(img => {
        img.addEventListener('error', function() {
            if (this.dataset.fallbackSet) return;
            this.dataset.fallbackSet = 'true';
            const parentCard = this.closest('.portfolio-card');
            let fallbackTitle = 'Blupure作品';
            if (parentCard) {
                const titleEl = parentCard.querySelector('.portfolio-card__title a');
                if (titleEl) fallbackTitle = titleEl.innerText;
            }
            this.src = generatePureBlueCover(fallbackTitle);
        });
    });
}

async function initPortfolio() {
    // 优先加载 works-index.json（同站加载，国内无需代理）
    try {
        const indexResp = await fetch('works-index.json');
        if (indexResp.ok) {
            const indexData = await indexResp.json();
            if (indexData && indexData.length > 0) {
                renderWorks(indexData);
                return;
            }
        }
    } catch (e) {
        console.log('works-index.json 加载失败，降级到 GitHub API', e);
    }

    // 降级: 走 GitHub API
    const { owner, repo } = getRepositoryInfo();
    if (!owner || !repo) {
        showNetworkError('未检测到 GitHub 仓库信息');
        return;
    }
    const apiEndpoint = `https://api.github.com/repos/${owner}/${repo}/contents/works`;
    try {
        const response = await fetch(apiEndpoint, {
            headers: { 'Accept': 'application/vnd.github.v3+json' }
        });
        if (response.status === 404) { showEmptyWorks(); return; }
        if (!response.ok) {
            if (response.status === 403) showNetworkError('GitHub API 请求频率受限', '您可以稍后重试。');
            else showNetworkError('无法获取作品目录 (' + response.status + ')');
            return;
        }
        const files = await response.json();
        if (!Array.isArray(files) || files.length === 0) { showEmptyWorks(); return; }
        const htmlFiles = files.filter(f => f.name && f.name.endsWith('.html') && f.type === 'file');
        if (htmlFiles.length === 0) { showEmptyWorks(); return; }

        const imageMap = new Map();
        const imageExts = ['.jpg', '.jpeg', '.png', '.webp', '.gif'];
        files.forEach(f => {
            const ext = f.name.substring(f.name.lastIndexOf('.')).toLowerCase();
            if (imageExts.includes(ext) && f.type === 'file') {
                imageMap.set(f.name.replace(/\.[^/.]+$/, ''), f.download_url);
            }
        });

        container.innerHTML = '';
        const allMetas = [];
        for (const fileItem of htmlFiles) {
            const baseName = fileItem.name.replace(/\.html$/i, '');
            const cover = imageMap.get(baseName) || '';
            try {
                const meta = await parseWorkMetadata(fileItem, cover);
                allMetas.push(meta);
            } catch (err) {
                allMetas.push({
                    title: fileItem.name.replace('.html', ''),
                    description: '点击进入查看完整数字创作内容。',
                    coverImg: cover || generatePureBlueCover(fileItem.name.replace('.html', '')),
                    category: '',
                    valid: true,
                    fileName: fileItem.name,
                    workUrl: 'works/' + fileItem.name
                });
            }
        }
        renderWorks(allMetas);
    } catch (err) {
        console.error('作品加载严重错误:', err);
        showNetworkError('网络请求异常或跨域问题', '请检查网络连接或 GitHub API 可用性。您也可以稍后刷新页面重试。');
    }
}
                
                initPortfolio();
            });
        })();

                    '<text x="8%" y="85%" fill="#FFFFFF" font-family="\'Inter\',system-ui" font-size="34" font-weight="800" letter-spacing="0.02em" opacity="0.95">' + esc(safeTitle) + '</text>' +

                    '</svg>'

            }

            function formatBlogDate(dateStr) {

                try {

                        return parseInt(parts[0], 10) + '年' + parseInt(parts[1], 10) + '月' + parseInt(parts[2], 10) + '日';
                    }

                    if (!isNaN(d.getTime())) {
                        return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';

            }

                                        '阅读文章 ' +
                                        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>' +

                                        tagsHtml +
                                    '</div>' +
                                '</div>';
                            container.appendChild(card);
                        });
                    } catch (err) {
                        console.error('Blog preview load error:', err);
                        container.innerHTML =
                            '<div class="blog-loading-wrapper" style="grid-column: 1/-1;">' +
                                '<p style="font-size: 1.4rem; color: var(--text-soft);">博客加载失败</p>' +
                            '</div>';
                    }
                }

                loadBlogPreview();
            });
        })();
    </script>

    <!-- 标题逐字拆包：等待字体和页面加载完再播放动画 -->
    <script>
        (function() {
            var index = 0;

            function splitTitleChars() {
                var selectors = ['.title-text', '.title-brand', '.title-text-alt'];
                selectors.forEach(function(sel) {
                    var el = document.querySelector(sel);
                    if (!el) return;
                    var text = el.textContent || '';
                    var html = '';
                    for (var i = 0; i < text.length; i++) {
                        var ch = text[i];
                        if (ch === ' ') {
                            html += ' ';
                        } else {
                            html += '<span class="char" style="--i: ' + index + '" data-char="' + ch + '">' +
                                    '<span class="char__inner">' + ch + '</span>' +
                                    '</span>';
                            index++;
                        }
                    }
                    el.innerHTML = html;
                });
                // 拆字完成后显示标题，防止闪烁
                var title = document.querySelector('.intro-title-styled');
                if (title) title.style.visibility = 'visible';
            }

            // 等待字体加载完成 + 页面资源加载完成（此时 preloader 开始淡出）
            Promise.all([
                new Promise(function(resolve) { window.addEventListener('load', resolve); }),
                document.fonts.ready
            ]).then(function() {
                // 再等 preloader 淡出动画结束（0.6s 延迟 + 0.3s 过渡）
                setTimeout(splitTitleChars, 900);
            });
        })();
    </script>

    <!-- 深色主题切换逻辑 -->
    <script>
        (function() {
            function getPreferredTheme() {
                var stored = localStorage.getItem('blupure-theme');
                if (stored) return stored;
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark-mode');
                } else {
                    document.documentElement.classList.remove('dark-mode');
                }
                try { localStorage.setItem('blupure-theme', theme); } catch(e) {}
            }

            applyTheme(getPreferredTheme());

            try {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    if (!localStorage.getItem('blupure-theme')) {
                        applyTheme(e.matches ? 'dark' : 'light');
                    }
                });
            } catch(e) {}

            document.addEventListener('DOMContentLoaded', function() {
                var toggle = document.getElementById('theme-toggle');
                if (toggle) {
                    toggle.addEventListener('click', function() {
                        var isDark = document.documentElement.classList.contains('dark-mode');
                        applyTheme(isDark ? 'light' : 'dark');
                    });
                }
            });
        })();
    </script>
</body>
