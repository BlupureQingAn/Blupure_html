/* 1. 浮动与流光动画定义（保持不变） */
@keyframes floatAnimation {
    0% {
        transform: translateY(0px) rotate(0deg);
    }
    50% {
        transform: translateY(-15px) rotate(0.5deg);
    }
    100% {
        transform: translateY(0px) rotate(0deg);
    }
}

@keyframes streamGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 2. 标题整体容器样式（负责全局字体、字号和浮动动画） */

/* 3. 中文部分（欢迎来到 & 会客厅）的独立渐变样式 */

/* 4. 专属品牌词（Blupure）流光发光样式 */

            top: 0;

            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;

    <!-- 核心加载模块：重构作品抓取逻辑，修复稳定性，保留蓝色纯度格调
    ================================================== -->
    <script>
        (function() {
            // 确保 DOM 加载完成再执行
            document.addEventListener('DOMContentLoaded', () => {
                
                // ----- 配置区（本地调试或自定义域名时填写自己的 GitHub 信息）-----
                const MANUAL_OWNER = "BlupureQingAn";    // GitHub 用户名
                const MANUAL_REPO  = "Blupure_html";     // 仓库名
                // -------------------------------------------------------------
                
                const container = document.getElementById('portfolio-container');
                if (!container) return;

                // 辅助函数: 生成高质优雅 SVG 占位 (Blupure风格)
                function generatePureBlueCover(titleText) {
                    const safeTitle = titleText.substring(0, 28);
                    return `data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500"><rect width="100%" height="100%" fill="%23002FA7"/><path d="M0 350 L800 280" stroke="%23FFFFFF" stroke-width="1.2" fill="none" opacity="0.15"/><circle cx="680" cy="100" r="180" fill="%23001F75" opacity="0.5"/><circle cx="120" cy="400" r="140" fill="%23001A60" opacity="0.4"/><text x="8%" y="85%" fill="%23FFFFFF" font-family="'Inter',system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" letter-spacing="0.02em" opacity="0.95">${escapeXml(safeTitle)}</text><text x="8%" y="75%" fill="%23FFFFFF" font-family="'Inter',system-ui" font-size="16" font-weight="400" opacity="0.6">Blupure · 作品集</text></svg>`;
                }

                function escapeXml(str) {
                    if(!str) return '';
                    return str.replace(/[<>&]/g, function(m) {
                        if(m === '<') return '\\u003c';
                        if(m === '>') return '\\u003e';
                        if(m === '&') return '\\u0026';
                        return m;
                    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                        return c;
                    });
                }

                // 获取正确的仓库信息（智能识别 github pages + 手动模式）
                function getRepositoryInfo() {
                    let owner = MANUAL_OWNER.trim();
                    let repo = MANUAL_REPO.trim();
                    const hostname = window.location.hostname;
                    const pathname = window.location.pathname;
                    
                    // 优先使用手动配置 (覆盖自动识别，更可靠)
                    if (owner && repo) {
                        return { owner, repo };
                    }
                    
                    // 自动识别: 适用于 *.github.io 域名
                    if (hostname.endsWith('.github.io')) {
                        owner = hostname.split('.')[0];
                        const pathParts = pathname.split('/').filter(Boolean);
                        if (pathParts.length > 0 && !pathParts[0].endsWith('.html')) {
                            repo = pathParts[0];
                        } else {
                            repo = `${owner}.github.io`;
                        }
                        return { owner, repo };
                    }
                    
                    // 未提供任何有效信息时返回 null
                    return { owner: null, repo: null };
                }

                // 针对单个作品文件，深度提取标题，描述，封面图
// 修改后的 parseWorkMetadata，支持传入同名封面
async function parseWorkMetadata(fileItem, sameNameCoverUrl = '') {
    const fileName = fileItem.name;
    const workPath = `works/${fileName}`;
    let htmlText = '';
    try {
        const resp = await fetch(fileItem.download_url);
        if (!resp.ok) throw new Error(`fetch failed ${resp.status}`);
        htmlText = await resp.text();
    } catch (err) {
        console.warn(`获取内容失败 ${fileName}:`, err);
        return {
            title: fileName.replace('.html', '').replace(/[-_]/g, ' '),
            description: '独立创作的数字化项目，点击卡片即刻探索沉浸空间。',
            coverImg: sameNameCoverUrl || generatePureBlueCover(fileName.replace('.html', '')),
            valid: true
        };
    }
    
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlText, 'text/html');
    
    // 标题：依然使用文件名（你可以保留原逻辑，这里按你的要求优先文件名）
    let rawTitle = fileName.replace(/\.html$/i, '').replace(/[-_]/g, ' ');
    
    // 描述提取（不变）
    let description = '';
    const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content');
    const ogDesc = doc.querySelector('meta[property="og:description"]')?.getAttribute('content');
    if (metaDesc && metaDesc.trim()) description = metaDesc.trim();
    else if (ogDesc && ogDesc.trim()) description = ogDesc.trim();
    else description = '该作品为Blupure对艺术的数字化转译，交互，文本，视觉相互渗透。点击进入完整体验。';
    
    // 封面图逻辑：优先使用传入的同名封面，其次 meta/og:image，最后蓝色 SVG
    let coverImg = sameNameCoverUrl;
    if (!coverImg) {
        const metaCover = doc.querySelector('meta[name="cover"]')?.getAttribute('content');
        const ogImage = doc.querySelector('meta[property="og:image"]')?.getAttribute('content');
        if (metaCover && metaCover.trim()) coverImg = metaCover.trim();
        else if (ogImage && ogImage.trim()) coverImg = ogImage.trim();
        
        if (!coverImg) {
            const firstImage = doc.querySelector('img');
            if (firstImage && firstImage.getAttribute('src')) {
                let src = firstImage.getAttribute('src');
                if (src && !src.startsWith('http') && !src.startsWith('//') && !src.startsWith('data:')) {
                    if (src.startsWith('./')) src = src.substring(2);
                    if (!src.startsWith('/') && !src.includes('://')) {
                        src = `works/${src}`;
                    }
                }
                coverImg = src;
            }
        }
    }
    
    if (!coverImg || coverImg === '') {
        coverImg = generatePureBlueCover(rawTitle);
    }
    
    return {
        title: rawTitle,
        description: description,
        coverImg: coverImg,
        valid: true,
        fileName: fileName,
        workUrl: workPath
    };
}

    const finalCover = metadata.coverImg;
    const finalTitle = metadata.title;
    const finalDesc = metadata.description;
    const linkUrl = metadata.workUrl;
    
    card.innerHTML = `
        <!-- 1. 修改图片链接的 target 属性 -->
        <a href="${linkUrl}" class="portfolio-card__media" target="_blank" rel="noopener noreferrer">
            <img src="${finalCover}" alt="${escapeXml(finalTitle)}" class="portfolio-card__img" onerror="this.onerror=null;this.src='${generatePureBlueCover(finalTitle)}'">
            <div class="portfolio-card__action-hint">
                进入体验 
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </div>
        </a>
        <div class="portfolio-card__content">
            <h3 class="portfolio-card__title">
                <!-- 2. 修改文字标题链接的 target 属性 -->
                <a href="${linkUrl}" target="_blank" rel="noopener noreferrer">${escapeXml(finalTitle)}</a>
            </h3>
            <p class="portfolio-card__desc">${escapeXml(finalDesc)}</p>
        </div>
    `;
    return card;
}
                
                // 展示加载错误 (网络/权限/限流等)
                function showNetworkError(msg, detail = '') {
                    container.innerHTML = `
                        <div class="loading-wrapper error-state-message" style="background: #fff; border-radius: 24px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--pure-blue)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                            <h3 style="color: #c0392b; margin: 0 0 1rem 0; font-weight: 600;">展厅检索异常</h3>
                            <p style="font-size: 1.4rem; max-width: 550px;">${msg}</p>
                            ${detail ? `<p style="font-size: 1.2rem; color:#777;">${detail}</p>` : ''}
                            <button id="retry-works-btn" style="margin-top: 2rem; background: var(--pure-blue); border: none; color: white; padding: 0.8rem 2rem; border-radius: 40px; font-weight: 500; cursor: pointer;">重新加载</button>
                        </div>
                    `;
                    const retryBtn = document.getElementById('retry-works-btn');
                    if (retryBtn) retryBtn.addEventListener('click', () => { window.location.reload(); });
                }
                
                function showEmptyWorks() {
                    container.innerHTML = `
                        <div class="loading-wrapper empty-state-message" style="background: #fff; border-radius: 24px; border: 1px dashed rgba(0,47,167,0.25);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--pure-blue)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">
                                <rect x="2" y="2" width="20" height="20" rx="2" ry="2"></rect>
                                <line x1="12" y1="18" x2="12" y2="12"></line>
                                <line x1="9" y1="15" x2="15" y2="15"></line>
                            </svg>
                            <h3 style="color: #111; margin-top: 0;">暂无作品陈列</h3>
                            <p style="max-width: 480px; font-size: 1.4rem;">请在仓库根目录创建 <strong style="color: var(--pure-blue);">/works</strong> 文件夹，并将您的 HTML 作品文件放入其中。系统会自动扫描并生成卡片，无需额外配置。</p>
                            <p style="font-size: 1.2rem; margin-top: 1.2rem;">✨ 提示: 每个作品支持自定义标题(title)、描述(meta name="description") 和封面(meta name="cover")</p>
                        </div>
                    `;
                }
                
                // 主要入口: 调用 GitHub API 获取 works 目录内容并渲染
async function initPortfolio() {
    const { owner, repo } = getRepositoryInfo();
    
    if (!owner || !repo) {
        showNetworkError('未检测到 GitHub 仓库信息');
        return;
    }
    
    const apiEndpoint = `https://api.github.com/repos/${owner}/${repo}/contents/works`;
    try {
        const response = await fetch(apiEndpoint, {
    headers: {
        'Accept': 'application/vnd.github.v3+json',
        'Authorization': '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'   // 替换成真实 token
    }
});
        
        if (response.status === 404) {
            showEmptyWorks();
            return;
        }
        if (!response.ok) {
            if (response.status === 403) {
                showNetworkError('GitHub API 请求频率受限', '您可以稍后重试。');
            } else {
                showNetworkError(`无法获取作品目录 (${response.status})`);
            }
            return;
        }
        
        const files = await response.json();
        if (!Array.isArray(files) || files.length === 0) {
            showEmptyWorks();
            return;
        }
        
        // 1. 分离 HTML 文件和图片文件
        const htmlFiles = files.filter(f => f.name && f.name.endsWith('.html') && f.type === 'file');
        if (htmlFiles.length === 0) {
            showEmptyWorks();
            return;
        }
        
        // 2. 构建 文件名(无扩展名) -> 图片URL 的映射
        const imageMap = new Map();
        const imageExtensions = ['.jpg', '.jpeg', '.png', '.webp', '.gif'];
        files.forEach(file => {
            const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            if (imageExtensions.includes(ext) && file.type === 'file') {
                const baseName = file.name.replace(/\.[^/.]+$/, ''); // 去掉扩展名
                imageMap.set(baseName, file.download_url);
            }
        });
        
        // 清空容器
        container.innerHTML = '';
        
        // 3. 遍历 HTML 文件，并尝试获取同名封面
        for (const fileItem of htmlFiles) {
            const htmlBaseName = fileItem.name.replace(/\.html$/i, '');
            const sameNameCover = imageMap.get(htmlBaseName) || '';
            try {
                const meta = await parseWorkMetadata(fileItem, sameNameCover);
                const card = renderCard(meta);
                container.appendChild(card);
            } catch (err) {
                console.warn(`处理作品 ${fileItem.name} 时出错:`, err);
                // 降级卡片
                const fallbackMeta = {
                    title: fileItem.name.replace('.html', ''),
                    description: '点击进入查看完整数字创作内容。',
                    coverImg: sameNameCover || generatePureBlueCover(fileItem.name.replace('.html', '')),
                    valid: true,
                    fileName: fileItem.name,
                    workUrl: `works/${fileItem.name}`
                };
                container.appendChild(renderCard(fallbackMeta));
            }
        }
        
        // 图片加载错误后备（保持不变）
        const allImgs = container.querySelectorAll('.portfolio-card__img');
        allImgs.forEach(img => {
            img.addEventListener('error', function(e) {
                if (!this.dataset.fallbackSet) {
                    this.dataset.fallbackSet = 'true';
                    const parentCard = this.closest('.portfolio-card');
                    let fallbackTitle = 'Blupure作品';
                    if (parentCard) {
                        const titleEl = parentCard.querySelector('.portfolio-card__title a');
                        if (titleEl) fallbackTitle = titleEl.innerText;
                    }
                    this.src = generatePureBlueCover(fallbackTitle);
                }
            });
        });
        
    } catch (err) {
        console.error('作品加载严重错误:', err);
        showNetworkError('网络请求异常或跨域问题', '请检查网络连接或 GitHub API 可用性。您也可以稍后刷新页面重试。');
    }
}
                
                initPortfolio();
            });
        })();
    </script>
