    <meta property="og:description" content="{{DESCRIPTION}}">

    <link rel="stylesheet" href="../css/vendor.css">
    <link rel="stylesheet" href="../css/styles.css">

    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">

    <link rel="stylesheet" href="https://fonts.googleapis.cn/css2?family=Mea+Culpa&family=Noto+Serif+SC:wght@400;600;700;900&display=swap">

    <style>
        :root {
            --font-1: "Noto Serif SC", "Roboto Flex", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", serif;
            --pure-blue: #002FA7;
            --pure-blue-hover: #001F70;
            --pure-blue-light: #E6EDFF;
            --pure-blue-alpha: rgba(0, 47, 167, 0.08);
            --text-dark: #111111;
            --text-soft: #555555;
            --card-bg: #ffffff;
            --section-bg-alt: #fafafb;
            --shadow-card: rgba(0, 47, 167, 0.08);
            --shadow-card-hover: rgba(0, 47, 167, 0.2);
            --text-gradient-end: #444444;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --pure-blue: #4D7CFF;
                --pure-blue-hover: #6B8FFF;
                --pure-blue-light: #0D1B3E;
                --pure-blue-alpha: rgba(77, 124, 255, 0.15);
                --text-dark: #E8E8E8;
                --text-soft: #AAAAAA;
                --card-bg: #1A1B2E;
                --section-bg-alt: #12131E;
                --shadow-card: rgba(0, 0, 0, 0.3);
                --shadow-card-hover: rgba(0, 0, 0, 0.4);
                --text-gradient-end: #BBBBBB;
            }
        }

        html.dark-mode {
            --pure-blue: #4D7CFF;
            --pure-blue-hover: #6B8FFF;
            --pure-blue-light: #0D1B3E;
            --pure-blue-alpha: rgba(77, 124, 255, 0.15);
            --text-dark: #E8E8E8;
            --text-soft: #AAAAAA;
            --card-bg: #1A1B2E;
            --section-bg-alt: #12131E;
            --shadow-card: rgba(0, 0, 0, 0.3);
            --shadow-card-hover: rgba(0, 0, 0, 0.4);
            --text-gradient-end: #BBBBBB;
        }

        ::selection { background-color: var(--pure-blue); color: #ffffff; }
        ::-moz-selection { background-color: var(--pure-blue); color: #ffffff; }
        a, a:hover, a:focus { color: var(--pure-blue); }

        .s-header { border-bottom: 1px solid rgba(0, 47, 167, 0.06); }
        .header-brand__text { color: var(--pure-blue) !important; font-weight: 700; letter-spacing: 0.05em; font-family: var(--font-1); text-transform: none; }
        .header-nav__links li.current a { color: var(--pure-blue) !important; }
        .header-nav__links li.current a::after { background-color: var(--pure-blue) !important; }
        .header-nav__links a:hover { color: var(--pure-blue) !important; }
        .s-footer { border-top: 1px solid rgba(0, 47, 167, 0.05); }
        .s-footer .ss-copyright,
        .s-footer .ss-back-to-top { font-size: 1.2rem; }
        .footer-line { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .footer-logo { font-weight: 700; color: var(--pure-blue); letter-spacing: 0.05em; }

        html.dark-mode, html.dark-mode * {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
    </style>
</head>
<body id="top">

    <div id="preloader">

    <div id="page" class="s-pagewrap">

                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>

    <script src="../js/plugins.js"></script>
    <script src="../js/main.js"></script>

    <script>
        (function() {
            function getPreferredTheme() {
                var stored = localStorage.getItem('blupure-theme');
                if (stored) return stored;
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark-mode');
                } else {
                    document.documentElement.classList.remove('dark-mode');
                }
                try { localStorage.setItem('blupure-theme', theme); } catch(e) {}
            }
            applyTheme(getPreferredTheme());
            try {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    if (!localStorage.getItem('blupure-theme')) {
                        applyTheme(e.matches ? 'dark' : 'light');
                    }
                });
            } catch(e) {}
            document.addEventListener('DOMContentLoaded', function() {
                var toggle = document.getElementById('theme-toggle');
                if (toggle) {
                    toggle.addEventListener('click', function() {
                        var isDark = document.documentElement.classList.contains('dark-mode');
                        applyTheme(isDark ? 'light' : 'dark');
                    });
                }
            });
        })();
    </script>
</body>
</html>
