    <script>
        (function() {
            function generateBlogCover(titleText) {
                var safeTitle = (titleText || 'Blupure').substring(0, 28);
                return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
                    '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">' +
                    '<rect width="100%" height="100%" fill="#0D1B3D"/>' +
                    '<path d="M0 360 L200 240 L400 340 L600 200 L800 310" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.12"/>' +
                    '<path d="M0 390 L180 280 L380 370 L580 240 L800 340" stroke="#FFFFFF" stroke-width="0.8" fill="none" opacity="0.08"/>' +
                    '<line x1="620" y1="80" x2="750" y2="80" stroke="#4D7CFF" stroke-width="3" opacity="0.35"/>' +
                    '<line x1="660" y1="105" x2="750" y2="105" stroke="#4D7CFF" stroke-width="2" opacity="0.2"/>' +
                    '<line x1="690" y1="130" x2="750" y2="130" stroke="#4D7CFF" stroke-width="1" opacity="0.12"/>' +
                    '<text x="8%" y="85%" fill="#FFFFFF" font-family="\'Inter\',system-ui" font-size="34" font-weight="800" letter-spacing="0.02em" opacity="0.95">' + escapeXml(safeTitle) + '</text>' +
                    '<text x="8%" y="75%" fill="#FFFFFF" font-family="\'Inter\',system-ui" font-size="16" font-weight="400" opacity="0.6">Blupure &middot; 文章</text>' +
                    '</svg>'
                );
            }

            function escapeXml(str) {
                if (!str) return '';
                return String(str).replace(/[<>&]/g, function(m) {
                    if (m === '<') return '\\u003c';
                    if (m === '>') return '\\u003e';
                    return '\\u0026';
                });
            }

            function formatDate(dateStr) {
                if (!dateStr) return '';
                try {
                    var d = new Date(dateStr);
                    if (isNaN(d.getTime())) return dateStr;
                    var year = d.getFullYear();
                    var month = d.getMonth() + 1;
                    var day = d.getDate();
                    // Check if YYYY-MM-DD format (no timezone shift)
                    var parts = dateStr.split('T')[0].split('-');
                    if (parts.length === 3) {
                        year = parseInt(parts[0], 10);
                        month = parseInt(parts[1], 10);
                        day = parseInt(parts[2], 10);
                    }
                    return year + '年' + month + '月' + day + '日';
                } catch(e) {
                    return dateStr;
                }
            }

            var container = document.getElementById('blog-container');
            var filtersEl = document.getElementById('blog-filters');
            var allPosts = [];

            function renderBlogCard(post, index) {
                var coverSrc = post.cover || generateBlogCover(post.title);
                var tagsHtml = '';
                if (post.tags && post.tags.length > 0) {
                    tagsHtml = '<div class="blog-card__tags">' +
                        post.tags.map(function(t) {
                            return '<span class="blog-card__tag">' + escapeXml(t) + '</span>';
                        }).join('') +
                        '</div>';
                }
                return '<article class="blog-card" style="--card-i: ' + index + '">' +
                    '<a href="' + post.workUrl + '" class="blog-card__media" target="_blank" rel="noopener noreferrer">' +
                        '<img src="' + coverSrc + '" alt="' + escapeXml(post.title) + '" class="blog-card__img"' +
                            ' onerror="this.onerror=null;this.src=\'' + generateBlogCover(post.title) + '\'">' +
                        '<div class="blog-card__action-hint">' +
                            '阅读文章 ' +
                            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>' +
                        '</div>' +
                    '</a>' +
                    '<div class="blog-card__content">' +
                        '<span class="blog-card__category">' + escapeXml(post.category || '') + '</span>' +
                        '<h2 class="blog-card__title"><a href="' + post.workUrl + '" target="_blank" rel="noopener noreferrer">' + escapeXml(post.title) + '</a></h2>' +
                        '<p class="blog-card__desc">' + escapeXml(post.description) + '</p>' +
                        '<div class="blog-card__footer">' +
                            '<time class="blog-card__date">' + formatDate(post.date) + '</time>' +
                            tagsHtml +
                        '</div>' +
                    '</div>' +
                '</article>';
            }

            function renderPosts(postsArray) {
                container.innerHTML = '';
                postsArray.forEach(function(post, i) {
                    container.innerHTML += renderBlogCard(post, i);
                });
            }

            function renderEmpty(title, msg) {
                container.innerHTML =
                    '<div class="blog-empty-state">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--pure-blue)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                            '<rect x="2" y="2" width="20" height="20" rx="2" ry="2"></rect>' +
                            '<line x1="12" y1="18" x2="12" y2="12"></line>' +
                            '<line x1="9" y1="15" x2="15" y2="15"></line>' +
                        '</svg>' +
                        '<h3>' + (title || '暂无文章') + '</h3>' +
                        '<p>' + (msg || '还没有发布任何博客文章，敬请期待。') + '</p>' +
                    '</div>';
            }

            function renderError(msg, detail) {
                container.innerHTML =
                    '<div class="blog-error-state">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--pure-blue)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                            '<circle cx="12" cy="12" r="10"></circle>' +
                            '<line x1="12" y1="8" x2="12" y2="12"></line>' +
                            '<line x1="12" y1="16" x2="12.01" y2="16"></line>' +
                        '</svg>' +
                        '<h3>' + (msg || '加载失败') + '</h3>' +
                        '<p>' + (detail || '无法获取文章列表，请稍后刷新页面重试。') + '</p>' +
                        '<button class="blog-retry-btn" onclick="location.reload()">重新加载</button>' +
                    '</div>';
            }

            function setupFilters(posts) {
                var categories = [];
                var catSet = {};
                posts.forEach(function(p) {
                    var c = p.category || '未分类';
                    if (!catSet[c]) { catSet[c] = true; categories.push(c); }
                });

                var allTags = [];
                var tagSet = {};
                posts.forEach(function(p) {
                    if (p.tags) {
                        p.tags.forEach(function(t) {
                            if (!tagSet[t]) { tagSet[t] = true; allTags.push(t); }
                        });
                    }
                });

                var html = '<div class="blog-filters__categories">';
                html += '<button class="filter-btn active" data-filter="all">全部</button>';
                categories.forEach(function(c) {
                    html += '<button class="filter-btn" data-filter="' + escapeXml(c) + '">' + escapeXml(c) + '</button>';
                });
                html += '</div>';

                if (allTags.length > 0) {
                    html += '<div class="blog-filters__tags">';
                    allTags.forEach(function(t) {
                        html += '<button class="filter-tag" data-tag="' + escapeXml(t) + '">' + escapeXml(t) + '</button>';
                    });
                    html += '</div>';
                }

                filtersEl.innerHTML = html;

                function applyFilters() {
                    var activeCat = filtersEl.querySelector('.filter-btn.active');
                    var catFilter = activeCat ? activeCat.dataset.filter : 'all';
                    var activeTags = [];
                    filtersEl.querySelectorAll('.filter-tag.active').forEach(function(el) {
                        activeTags.push(el.dataset.tag);
                    });

                    var filtered = allPosts.filter(function(post) {
                        var pc = post.category || '未分类';
                        if (catFilter !== 'all' && pc !== catFilter) return false;
                        if (activeTags.length > 0) {
                            var matched = activeTags.some(function(t) {
                                return post.tags && post.tags.includes(t);
                            });
                            if (!matched) return false;
                        }
                        return true;
                    });

                    if (filtered.length === 0) {
                        renderEmpty('没有匹配的文章', '试试其他筛选条件');
                    } else {
                        renderPosts(filtered);
                    }
                }

                filtersEl.querySelectorAll('.filter-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        filtersEl.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
                        this.classList.add('active');
                        applyFilters();
                    });
                });

                filtersEl.querySelectorAll('.filter-tag').forEach(function(chip) {
                    chip.addEventListener('click', function() {
                        this.classList.toggle('active');
                        applyFilters();
                    });
                });
            }

            async function initBlog() {
                try {
                    var resp = await fetch('blog-index.json');
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    allPosts = await resp.json();

                    if (!allPosts || allPosts.length === 0) {
                        renderEmpty();
                        return;
                    }

                    setupFilters(allPosts);
                    renderPosts(allPosts);
                } catch (err) {
                    console.error('Blog load error:', err);
                    renderError();
                }
            }

            document.addEventListener('DOMContentLoaded', initBlog);
        })();
    </script>

    <script>
        (function() {
            function getPreferredTheme() {
                var stored = localStorage.getItem('blupure-theme');
                if (stored) return stored;
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark-mode');
                } else {
                    document.documentElement.classList.remove('dark-mode');
                }
                try { localStorage.setItem('blupure-theme', theme); } catch(e) {}
            }
            applyTheme(getPreferredTheme());
            try {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    if (!localStorage.getItem('blupure-theme')) {
                        applyTheme(e.matches ? 'dark' : 'light');
                    }
                });
            } catch(e) {}
            document.addEventListener('DOMContentLoaded', function() {
                var toggle = document.getElementById('theme-toggle');
                if (toggle) {
                    toggle.addEventListener('click', function() {
                        var isDark = document.documentElement.classList.contains('dark-mode');
                        applyTheme(isDark ? 'light' : 'dark');
                    });
                }
            });
        })();
    </script>
</body>
